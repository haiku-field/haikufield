<!DOCTYPE html>
<html lang="en">
<head>

<title>Haiku Field</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#ffffff;
    color:#111;
    font-family:'Lato',sans-serif;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:24px 16px 0 16px;
}

.logo{
    font-size:13pt;
    font-weight:300;
    color:#444;
}

nav{
    display:flex;
    gap:30px;
    font-size:13pt;
    font-weight:300;
}

nav a{
    text-decoration:none;
    color:#666;
}

main{
    text-align:center;
    margin-top:55px;
}

h1{
    font-size:34pt;
    font-weight:400;
    margin:0 0 14px 0;
}

.subtitle{
    font-size:21pt;
    font-weight:300;
    font-style:italic;
    margin-bottom:12px;
}

.tagline{
    font-size:13pt;
    font-weight:300;
    font-style:italic;
    margin-bottom:58px;
}

.collection{
    margin-bottom:22px;
    line-height:1.3;
}

.collection-title{
    font-size:13pt;
    font-weight:400;
}

.collection-type{
    font-size:13pt;
    font-weight:300;
    color:#444;
}

.contact{
    margin-top:75px;
    margin-bottom:80px;
    font-size:13pt;
    line-height:1.9;
}

.email{
    color:#111;
}

a{
    color:inherit;
}

@media (max-width:900px){

    header{
        flex-direction:column;
        align-items:center;
        gap:20px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
        gap:16px;
        padding:0 15px;
    }

    main{
        padding:0 20px;
    }

    h1{
        font-size:26pt;
    }

    .subtitle{
        font-size:18pt;
    }
}

</style>
</head>

<body>

<header>

<div class="logo">Haiku Field</div>

<nav>
<a href="index.html">Home</a>
<a href="haiga.html">HAIGA (Haiku Images)</a>
<a href="touch.html">TOUCH (Sculptures)</a>
<a href="echo.html">ECHO (Sculptures)</a>
<a href="moment.html">MOMENT (Paintings)</a>
<a href="once.html">ONCE (Paintings)</a>
</nav>

</header>

<main>

<h1>Haiku Field</h1>

<div class="subtitle">
Meditative Abstract Works
</div>

<div class="tagline">
Where image, form and silence meet
</div>

<div class="collection">
<div class="collection-title">HAIGA</div>
<div class="collection-type">Haiku Images</div>
</div>

<div class="collection">
<div class="collection-title">TOUCH</div>
<div class="collection-type">Sculptures</div>
</div>

<div class="collection">
<div class="collection-title">ECHO</div>
<div class="collection-type">Sculptures</div>
</div>

<div class="collection">

<div class="collection-type">Paintings</div>
</div>

<div class="collection">

<div class="collection-type">Paintings</div>
</div>

<div class="contact">

</div>

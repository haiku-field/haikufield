<style>
body{
    margin:0;

header{

    z-index:1000;
    background:#1f1f1f;
    color:#fff;
    display:flex;

}

.logo{
    font-size:13pt;

    color:#fff;
    white-space:nowrap;
}

    font-weight:300;

nav a{
    text-decoration:none;
    color:#fff;
    white-space:nowrap;
}

nav a:hover{
    color:#7ec8e3;
}

main{
    text-align:center;
    margin-top:55px;
}

h1{

    font-weight:400;

}

.tagline{

    font-weight:300;
    font-style:italic;
    margin-bottom:58px;
}

.collection{
    margin-bottom:22px;
    line-height:1.3;
}

.collection a{
    color:#111;
    text-decoration:none;
}

.collection-title{
    font-size:13pt;
    font-weight:400;
}

.collection-type{
    font-size:13pt;
    font-weight:300;
    color:#444;
}

.contact{
    margin-top:95px;
    margin-bottom:80px;
    font-size:13pt;
    line-height:1.9;
}

.email{
    color:#111;
}

@media (max-width:900px){
    header{
        flex-direction:column;
        align-items:center;
        gap:14px;
        padding:14px 10px;
    }

    nav{
        flex-wrap:wrap;
        justify-content:center;
        gap:14px 18px;
        font-size:12pt;
    }

    main{
        padding:0 20px;
        margin-top:40px;
    }

    h1{
        font-size:26pt;
    }

    .subtitle{
        font-size:18pt;
    }
}
